<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--
Project : Grace Animated Face
Creator : AdyGhany
Powered by GitHub Pages

<title>Grace - By AdyGhany</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1a1a2e,#000);
overflow:hidden;
font-family:Arial,sans-serif;
}

.stars{
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:30px 30px;
animation:moveStars 20s linear infinite;
opacity:.4;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(100px);
}
}

.face{
position:relative;
width:320px;
height:420px;
background:#f4c9a8;
border-radius:50%;
box-shadow:0 0 40px rgba(255,180,120,.4);
}

.hair{
position:absolute;
width:360px;
height:240px;
background:#2b1408;
top:-40px;
left:-20px;
border-radius:50% 50% 40% 40%;
z-index:-1;
}

.eye{
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
top:150px;
overflow:hidden;
box-shadow:inset 0 0 10px rgba(0,0,0,.3);
}

.left{
left:85px;
}

.right{
right:85px;
}

.pupil{
width:22px;
height:22px;
background:black;
border-radius:50%;
position:absolute;
top:14px;
left:14px;
transition:.05s;
}

.eyelid{
position:absolute;
width:100%;
height:0%;
background:#f4c9a8;
animation:blink 5s infinite;
}

@keyframes blink{
0%,45%,48%,100%{
height:0%;
}
46%,47%{
height:100%;
}
}

.nose{
position:absolute;
width:18px;
height:55px;
background:#e7b48e;
border-radius:20px;
top:190px;
left:151px;
}

.mouth{
position:absolute;
width:90px;
height:40px;
border-bottom:5px solid #d34d6d;
border-radius:0 0 60px 60px;
top:285px;
left:115px;
}

.glow{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
box-shadow:0 0 50px cyan;
opacity:.15;
}

.name{
position:absolute;
bottom:-70px;
width:100%;
text-align:center;
font-size:38px;
font-weight:bold;
color:#fff;
text-shadow:0 0 20px cyan;
letter-spacing:4px;
}

.credit{
position:absolute;
bottom:-105px;
width:100%;
text-align:center;
font-size:16px;
color:#aaa;
letter-spacing:3px;
text-shadow:0 0 10px cyan;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="face">

<div class="glow"></div>
<div class="hair"></div>

<div class="eye left">
<div class="pupil"></div>
<div class="eyelid"></div>
</div>

<div class="eye right">
<div class="pupil"></div>
<div class="eyelid"></div>
</div>

<div class="nose"></div>
<div class="mouth"></div>

<div class="name">GRACE</div>
<div class="credit">BY AdyGhany</div>

</div>

<script>

function moveEyes(x,y){
document.querySelectorAll(".pupil").forEach(pupil=>{

const eye=pupil.parentElement;
const rect=eye.getBoundingClientRect();

const cx=rect.left+rect.width/2;
const cy=rect.top+rect.height/2;

const angle=Math.atan2(y-cy,x-cx);

pupil.style.transform=
`translate(${Math.cos(angle)*8}px,
${Math.sin(angle)*8}px)`;

});
}

document.addEventListener("mousemove",e=>{
moveEyes(e.clientX,e.clientY);
});

document.addEventListener("touchmove",e=>{
moveEyes(
e.touches[0].clientX,
e.touches[0].clientY
);
});

</script>

</body>
</html>
