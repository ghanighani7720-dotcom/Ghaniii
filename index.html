<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdyGhany Cosmic Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

canvas{
position:absolute;
width:100%;
height:100%;
}

.portal{
position:relative;
width:300px;
height:300px;
border-radius:50%;
border:4px solid rgba(0,255,255,.5);
box-shadow:
0 0 20px cyan,
0 0 60px cyan,
0 0 120px blue;
animation:spin 12s linear infinite;
}

.portal::before{
content:"";
position:absolute;
inset:20px;
border-radius:50%;
border:3px solid rgba(255,0,255,.5);
animation:spinReverse 8s linear infinite;
}

.portal::after{
content:"";
position:absolute;
inset:50px;
border-radius:50%;
background:radial-gradient(circle,
rgba(0,255,255,.4),
rgba(0,0,255,.1),
transparent);
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes spinReverse{
from{transform:rotate(360deg);}
to{transform:rotate(0deg);}
}

.name{
position:absolute;
color:white;
font-size:48px;
font-weight:bold;
letter-spacing:4px;
text-shadow:
0 0 10px cyan,
0 0 20px cyan,
0 0 40px blue;
animation:pulse 2s infinite;
}

.credit{
position:absolute;
margin-top:90px;
color:#aaa;
letter-spacing:3px;
font-size:14px;
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="portal"></div>

<div style="position:absolute;text-align:center;">
<div class="name">AdyGhany</div>
<div class="credit">COSMIC PORTAL</div>
</div>

<script>
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const stars=[];

for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*2+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fill();

star.y+=star.s;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>

</body>
</html>
